<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E7 Gear Forge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Main Container -->
  <main class="app-container">
    
    <!-- Top Action Control Bar -->
    <div class="action-bar">
      <button id="config-btn" class="btn-secondary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Options
      </button>

      <button id="generate-btn" class="btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        Forge Gear
      </button>

      <button id="reset-upgrade-btn" class="btn-danger" disabled>
        Re-roll (+0)
      </button>
    </div>

    <!-- Centered Visual Workspace -->
    <div class="workspace-layout">
      <!-- Left: Gear Card -->
      <div class="workspace-card-panel" id="gear-card-container">
        <!-- Rendered simplified gear card -->
      </div>

      <!-- Right: Compact Enhancement Log with buttons below -->
      <div class="workspace-log-panel">
        <h2 class="log-title">Enhancement Log</h2>
        <div class="log-content-wrapper" id="history-container">
          <!-- Rendered small history logs -->
        </div>
        
        <!-- Enhancer buttons relocated directly below the log window -->
        <div class="enhancer-group">
          <button id="enhance-3-btn" class="btn-secondary btn-compact" disabled>+3</button>
          <button id="enhance-6-btn" class="btn-secondary btn-compact" disabled>+6</button>
          <button id="enhance-9-btn" class="btn-secondary btn-compact" disabled>+9</button>
          <button id="enhance-12-btn" class="btn-secondary btn-compact" disabled>+12</button>
          <button id="enhance-15-btn" class="btn-secondary btn-compact" disabled>+15</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Modal Configuration Dialog -->
  <dialog id="config-dialog">
    <div class="dialog-header">
      <h2>Configure Forge Settings</h2>
      <button id="dialog-close-btn" class="dialog-close-x">&times;</button>
    </div>
    
    <div class="dialog-body">
      <!-- Rarity Checklist -->
      <div class="form-group">
        <label>Gear Rarity</label>
        <div class="pills-grid" id="rarities-pills-grid"></div>
      </div>

      <!-- Level Checklist -->
      <div class="form-group">
        <label>Gear Level</label>
        <div class="pills-grid" id="levels-pills-grid"></div>
      </div>

      <!-- Slots Checkbox Grid -->
      <div class="form-group">
        <label>Gear Slots</label>
        <div class="pills-grid" id="slots-pills-grid"></div>
      </div>

      <!-- Main Stat Types Checkbox Grid -->
      <div class="form-group">
        <label>Main Stats</label>
        <div class="pills-grid" id="mains-pills-grid"></div>
      </div>

      <!-- Sets Checkbox Grid -->
      <div class="form-group">
        <label>Gear Sets</label>
        <div class="pills-grid" id="sets-pills-grid"></div>
      </div>
    </div>

    <div class="dialog-footer">
      <button id="dialog-save-btn" class="btn-primary button-full">Save Options</button>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
