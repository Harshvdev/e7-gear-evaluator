<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E7 Gear Forge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Main Container -->
  <main class="app-container">
    
    <!-- Top Action Control Bar -->
    <div class="action-bar">
      <button id="config-btn" class="btn-secondary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Options
      </button>
      
      <button id="hero-config-btn" class="btn-secondary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        Hero Config
      </button>

      <button id="generate-btn" class="btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        Forge Gear
      </button>

      <button id="reset-upgrade-btn" class="btn-danger" disabled>
        Re-roll (+0)
      </button>
    </div>

    <!-- Centered Visual Workspace -->
    <div class="workspace-layout">
      <!-- Left: Gear Card -->
      <div class="workspace-card-panel" id="gear-card-container">
        <!-- Rendered simplified gear card -->
      </div>

      <!-- Center: Evaluation Panel -->
      <div class="workspace-evaluation-panel" id="evaluation-container">
        <div class="eval-empty-state">
          <p>Forge a gear piece to evaluate</p>
        </div>
      </div>

      <!-- Right: Compact Enhancement Log with buttons below -->
      <div class="workspace-log-panel">
        <h2 class="log-title">Enhancement Log</h2>
        <div class="log-content-wrapper" id="history-container">
          <!-- Rendered small history logs -->
        </div>
        
        <!-- Enhancer buttons relocated directly below the log window -->
        <div class="enhancer-group">
          <button id="enhance-3-btn" class="btn-secondary btn-compact" disabled>+3</button>
          <button id="enhance-6-btn" class="btn-secondary btn-compact" disabled>+6</button>
          <button id="enhance-9-btn" class="btn-secondary btn-compact" disabled>+9</button>
          <button id="enhance-12-btn" class="btn-secondary btn-compact" disabled>+12</button>
          <button id="enhance-15-btn" class="btn-secondary btn-compact" disabled>+15</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Modal Configuration Dialog -->
  <dialog id="config-dialog">
    <div class="dialog-header">
      <h2>Configure Forge Settings</h2>
      <button id="dialog-close-btn" class="dialog-close-x">&times;</button>
    </div>
    
    <div class="dialog-body">
      <!-- Rarity Checklist -->
      <div class="form-group">
        <label>Gear Rarity</label>
        <div class="pills-grid" id="rarities-pills-grid"></div>
      </div>

      <!-- Level Checklist -->
      <div class="form-group">
        <label>Gear Level</label>
        <div class="pills-grid" id="levels-pills-grid"></div>
      </div>

      <!-- Slots Checkbox Grid -->
      <div class="form-group">
        <label>Gear Slots</label>
        <div class="pills-grid" id="slots-pills-grid"></div>
      </div>

      <!-- Main Stat Types Checkbox Grid -->
      <div class="form-group">
        <label>Main Stats</label>
        <div class="pills-grid" id="mains-pills-grid"></div>
      </div>

      <!-- Sets Checkbox Grid -->
      <div class="form-group">
        <label>Gear Sets</label>
        <div class="pills-grid" id="sets-pills-grid"></div>
      </div>

      <!-- Divider line -->
      <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.08); margin: 1.5rem 0;">

      <h3 style="font-family: var(--font-display); font-size: 0.875rem; font-weight: 700; text-transform: uppercase; color: var(--primary); margin-bottom: 1rem; letter-spacing: 0.05em;">Hero Filters</h3>

      <!-- Hero Role Checklist -->
      <div class="form-group">
        <label>Hero Role (Class)</label>
        <div class="pills-grid" id="hero-roles-pills-grid"></div>
      </div>

      <!-- Hero Star Checklist -->
      <div class="form-group">
        <label>Hero Stars (Rarity)</label>
        <div class="pills-grid" id="hero-stars-pills-grid"></div>
      </div>

      <!-- Hero Element Checklist -->
      <div class="form-group">
        <label>Hero Element</label>
        <div class="pills-grid" id="hero-elements-pills-grid"></div>
      </div>
    </div>

    <div class="dialog-footer">
      <button id="dialog-save-btn" class="btn-primary button-full">Save Options</button>
    </div>
  </dialog>

  <!-- Hero Selection and Build Configuration Dialog -->
  <dialog id="hero-config-dialog" closedby="any" style="max-width: 1080px; width: 95%;">
    <div class="dialog-header">
      <h2>Hero & Build Configuration</h2>
      <button id="hero-config-close-btn" class="dialog-close-x">&times;</button>
    </div>
    
    <div class="dialog-body">
      <!-- Search & Filters Container -->
      <div class="hero-config-filters-container">
        <div style="flex: 1; min-width: 200px;">
          <input type="text" id="hero-config-search" placeholder="Search hero by name..." class="eval-search-input" style="width: 100%; margin: 0;">
        </div>
        <div class="hero-config-dropdowns">
          <select id="hero-config-filter-role" class="select-dropdown">
            <option value="">All Roles</option>
            <option value="warrior">Warrior</option>
            <option value="knight">Knight</option>
            <option value="thief">Thief</option>
            <option value="ranger">Ranger</option>
            <option value="mage">Mage</option>
            <option value="manauser">Soul Weaver</option>
          </select>
          <select id="hero-config-filter-element" class="select-dropdown">
            <option value="">All Elements</option>
            <option value="fire">Fire</option>
            <option value="ice">Ice</option>
            <option value="wind">Wind</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <select id="hero-config-filter-rarity" class="select-dropdown">
            <option value="">All Rarities</option>
            <option value="5">5★</option>
            <option value="4">4★</option>
            <option value="3">3★</option>
          </select>
        </div>
      </div>

      <!-- Bulk Selection Tools -->
      <div class="hero-config-bulk-actions">
        <button id="hero-bulk-enable-all" class="btn-secondary btn-compact">Enable All</button>
        <button id="hero-bulk-disable-all" class="btn-secondary btn-compact">Disable All</button>
        <button id="hero-bulk-rank1-only" class="btn-secondary btn-compact">Rank 1 Builds Only</button>
      </div>

      <!-- Hero & Build Grid/List -->
      <div class="hero-config-grid" id="hero-config-list-container">
        <!-- Dynmically rendered list of hero items with switches and build checkboxes -->
      </div>
    </div>

    <div class="dialog-footer">
      <button id="hero-config-save-btn" class="btn-primary button-full">Save Configuration</button>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
